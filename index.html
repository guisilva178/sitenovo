<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guilherme ❤️ Vitória</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff4d6d, #ff8fa3);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* CORAÇÕES CAINDO */
.heart {
  position: fixed;
  top: -10px;
  color: #fff;
  font-size: 20px;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
  }
}

h1 {
  margin-top: 30px;
  font-size: 38px;
}

.container {
  background: rgba(255,255,255,0.15);
  padding: 20px;
  margin: 20px auto;
  width: 85%;
  border-radius: 20px;
  backdrop-filter: blur(10px);
}

img {
  width: 220px;
  border-radius: 15px;
  margin-top: 10px;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: white;
  color: #ff4d6d;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}

</style>
</head>

<body>

<h1>Guilherme ❤️ Vitória</h1>

<p id="tempo"></p>

<div class="container">
  <p>
    Amor, desde o dia que te conheci minha vida mudou completamente.
    Eu te amo muito ❤️
  </p>

  <!-- SUA FOTO -->
  <img src="foto.jpg" alt="nós">

</div>

<!-- MÚSICA -->
<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<br>
<button onclick="tocarMusica()">▶ Tocar música</button>

<script>
// CORAÇÕES CAINDO
function criarCoracao() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (2 + Math.random() * 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(criarCoracao, 300);

// CONTADOR
const inicio = new Date("2026-03-08"); // troca aqui

function atualizarTempo() {
  const agora = new Date();
  const diff = agora - inicio;

  const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
  const horas = Math.floor(diff / (1000 * 60 * 60));

  document.getElementById("tempo").innerHTML =
    dias + " dias e " + horas + " horas juntos ❤️";
}

setInterval(atualizarTempo, 1000);
atualizarTempo();

// MÚSICA
function tocarMusica() {
  document.getElementById("musica").play();
}
</script>

</body>
</html>
