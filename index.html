<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guilherme ❤️ Vitória</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #ff4d6d, #ff8fa3);
  color: white;
  text-align: center;
}

/* LOGIN */
#login {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #ff4d6d;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  text-align: center;
}

button {
  margin-top: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: white;
  color: #ff4d6d;
  font-weight: bold;
  cursor: pointer;
}

/* SITE */
#site {
  display: none;
  padding: 20px;
}

.galeria {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 15px;
}

.galeria img {
  width: 100%;
  border-radius: 15px;
  object-fit: cover;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>🔐 Digite a senha</h2>
  <input type="password" id="senha" placeholder="DDMMAAAA">
  <button onclick="entrar()">Entrar</button>
</div>

<!-- SITE -->
<div id="site">

  <h1>Guilherme ❤️ Vitória</h1>

  <p id="contador"></p>

  <p>Eu te amo ❤️</p>

  <!-- GALERIA 6 FOTOS -->
  <h2>📸 Nossas fotos</h2>

  <div class="galeria">
    <img src="foto1.jpg">
    <img src="foto2.jpg">
    <img src="foto3.jpg">
    <img src="foto4.jpg">
    <img src="foto5.jpg">
    <img src="foto6.jpg">
  </div>

  <br>

  <button onclick="document.getElementById('musica').play()">
    ▶ Tocar música 🎵
  </button>

  <audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

</div>

<script>

const senhaCorreta = "08032026";

function entrar() {
  const senha = document.getElementById("senha").value;

  if (senha === senhaCorreta) {
    document.getElementById("login").style.display = "none";
    document.getElementById("site").style.display = "block";
  } else {
    alert("Senha errada ❌");
  }
}

// contador
const inicio = new Date("2026-03-08");

function atualizar() {
  const agora = new Date();
  const diff = agora - inicio;

  const dias = Math.floor(diff / (1000 * 60 * 60 * 24));

  document.getElementById("contador").innerHTML =
    dias + " dias juntos ❤️";
}

setInterval(atualizar, 1000);
atualizar();

</script>

</body>
</html>
