<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nosso Amor ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff4d6d, #ff8fa3);
  color: white;
  text-align: center;
}

.card {
  max-width: 420px;
  margin: 60px auto;
  background: rgba(255,255,255,0.15);
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

img {
  width: 100%;
  border-radius: 15px;
  margin-top: 15px;
}

button {
  margin-top: 15px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: white;
  color: #ff4d6d;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card">

  <h1>❤️ Nosso Amor ❤️</h1>

  <p id="tempo"></p>

  <p>
    Você é tudo pra mim. Te amo ❤️
  </p>

  <!-- FOTO (TEM QUE ESTAR NO MESMO REPO) -->
  <img src="foto.jpg" alt="foto do casal">

  <!-- BOTÃO DE MÚSICA (OBRIGATÓRIO clicar) -->
  <button onclick="document.getElementById('musica').play()">
    Tocar música 🎵
  </button>

  <audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

</div>

<script>
// contador simples
const inicio = new Date("2024-01-01");

function atualizar() {
  const agora = new Date();
  const diff = agora - inicio;
  const dias = Math.floor(diff / (1000 * 60 * 60 * 24));

  document.getElementById("tempo").innerHTML =
    "Estamos juntos há " + dias + " dias ❤️";
}

setInterval(atualizar, 1000);
atualizar();
</script>

</body>
</html>
