<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guilherme ❤️ Vitória</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #ff4d6d, #ff8fa3);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* LOGIN */
#login {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #ff4d6d;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  margin-top: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: white;
  color: #ff4d6d;
  cursor: pointer;
}

/* CONTEÚDO */
#site {
  display: none;
}

img {
  width: 250px;
  border-radius: 15px;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Digite a senha ❤️</h2>
  <input type="password" id="senha" placeholder="DDMMAAAA">
  <button onclick="entrar()">Entrar</button>
</div>

<!-- SITE -->
<div id="site">

  <h1>Guilherme ❤️ Vitória</h1>

  <p id="contador"></p>

  <p>Eu te amo ❤️</p>

  <img src="foto.jpg">

  <br>

  <button onclick="document.getElementById('musica').play()">
    Tocar música 🎵
  </button>

  <audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

</div>

<script>

const senhaCorreta = "08032026";

function entrar() {
  const senha = document.getElementById("senha").value;

  if (senha === senhaCorreta) {
    document.getElementById("login").style.display = "none";
    document.getElementById("site").style.display = "block";
  } else {
    alert("Senha errada ❌");
  }
}

// contador
const inicio = new Date("2026-03-08");

function atualizar() {
  const agora = new Date();
  const diff = agora - inicio;

  const dias = Math.floor(diff / (1000 * 60 * 60 * 24));

  document.getElementById("contador").innerHTML =
    dias + " dias juntos ❤️";
}

setInterval(atualizar, 1000);
atualizar();

</script>

</body>
</html>
